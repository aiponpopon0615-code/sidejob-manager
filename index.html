<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副業管理</title>
  <style>
    :root{
      --bg:#fff8fb;
      --card:#ffffff;
      --line:#eadde5;
      --text:#3a2d35;
      --muted:#7a6871;
      --yellow:#fff3bf;
      --green:#daf5df;
      --purple:#ece4ff;
      --blue:#eaf3ff;
      --danger:#ffe2e2;
      --gray:#f3f3f3;
      --gray-line:#d0d0d0;
      --alert-bg:#fff1f1;
      --alert-line:#f2a7a7;
      --shadow:0 8px 24px rgba(58,45,53,.06);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,#fff8fb 0%,#fffdfd 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }

    body{
      padding:16px;
    }

    .wrap{
      width:100%;
      max-width:1280px;
      margin:0 auto;
    }

    h1{
      margin:0 0 18px;
      font-size:32px;
      line-height:1.2;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    button,
    select,
    input,
    textarea{
      font:inherit;
    }

    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      background:#fff;
      border:1px solid var(--line);
      cursor:pointer;
      color:var(--text);
    }

    button:hover{
      opacity:.95;
    }

    .primary{
      background:#fff;
    }

    /* 上部 */
    .top-grid{
      display:grid;
      grid-template-columns:1.65fr 1fr;
      gap:16px;
      align-items:start;
      margin-bottom:16px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .stat{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fff;
      min-height:104px;
    }

    .stat-label{
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
    }

    .stat-value{
      font-size:32px;
      font-weight:700;
      line-height:1;
      margin-top:24px;
    }

    .section-title{
      font-size:22px;
      font-weight:700;
      margin:0 0 12px;
    }

    .check-list{
      display:grid;
      gap:12px;
    }

    .check-item{
      border:1px dashed #f2b9cb;
      background:#fffafb;
      border-radius:16px;
      padding:14px;
    }

    .check-client{
      font-weight:700;
      font-size:18px;
      margin-bottom:6px;
      word-break:break-word;
    }

    .check-status{
      font-weight:600;
      margin-bottom:6px;
      word-break:break-word;
    }

    .check-memo{
      color:var(--muted);
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    /* フィルター */
    .filters{
      display:grid;
      grid-template-columns:minmax(240px,1.2fr) minmax(180px,.9fr) minmax(180px,.8fr) minmax(220px,.9fr) auto;
      gap:10px;
      align-items:center;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      background:#fff;
      color:var(--text);
      appearance:auto;
      -webkit-appearance:auto;
      -moz-appearance:auto;
      min-height:48px;
    }

    textarea{
      min-height:auto;
      resize:vertical;
    }

    .toggle-box{
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      padding:0 4px;
      min-height:48px;
    }

    .toggle-box input[type="checkbox"]{
      width:auto;
      min-height:auto;
      margin:0;
      transform:scale(1.15);
      accent-color:#b98aa0;
    }

    /* カード */
    .cards{
      display:grid;
      gap:16px;
    }

    .job-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:20px 24px;
      display:grid;
      gap:14px;
    }

    .job-card.stale{
      border-color:var(--alert-line);
      background:var(--alert-bg);
    }

    .job-card.ended{
      opacity:.92;
    }

    .job-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .priority-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      font-weight:700;
      min-width:86px;
      white-space:nowrap;
    }

    .priority-最重要{background:var(--yellow)}
    .priority-重要{background:var(--green)}
    .priority-確認中{background:#f5e7bf}
    .priority-普通{background:var(--blue)}
    .priority-待機{background:var(--purple)}

    .job-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .tiny{
      padding:10px 12px;
      font-size:14px;
    }

    .danger{
      background:var(--danger);
    }

    .job-grid{
      display:grid;
      grid-template-columns:1.35fr .65fr;
      gap:18px 28px;
      align-items:start;
    }

    .field{
      min-width:0;
    }

    .field.full{
      grid-column:1 / -1;
    }

    .label{
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .value{
      font-size:18px;
      font-weight:600;
      line-height:1.55;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .value.small{
      font-size:16px;
      font-weight:500;
    }

    .status-pill{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
      border:1px solid var(--line);
      background:#fff;
    }

    .status-面談予定{
      background:#ffe8ee;
      border-color:#f6c1cf;
    }

    .status-契約中{
      background:#eef9ef;
      border-color:#bfe3c4;
    }

    .status-納品済{
      background:#eef4ff;
      border-color:#c7d8ff;
    }

    .status-相談中{
      background:#fff5df;
      border-color:#ecd7a1;
    }

    .status-契約リクエスト中{
      background:#f1ebff;
      border-color:#d8cbff;
    }

    .status-終了{
      background:var(--gray);
      border-color:var(--gray-line);
      color:#666;
    }

    .alert-badge{
      display:inline-block;
      margin-left:8px;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#ffdfdf;
      color:#a94442;
      border:1px solid #f0b4b4;
      vertical-align:middle;
    }

    /* フォーム */
    details.form-wrap{
      margin-top:18px;
    }

    details summary{
      cursor:pointer;
      font-weight:700;
      font-size:18px;
      list-style:none;
    }

    details summary::-webkit-details-marker{
      display:none;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:14px;
    }

    .form-grid .full{
      grid-column:1 / -1;
    }

    .save-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    @media (max-width: 1024px){
      .top-grid{
        grid-template-columns:1fr;
      }

      .stats{
        grid-template-columns:repeat(2,1fr);
      }

      .filters{
        grid-template-columns:1fr 1fr;
      }

      .job-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      body{
        padding:12px;
      }

      h1{
        font-size:28px;
      }

      .panel,
      .job-card{
        padding:14px;
      }

      .top-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
      }

      .top-actions button{
        width:100%;
      }

      .stats{
        grid-template-columns:1fr 1fr;
      }

      .filters{
        grid-template-columns:1fr;
      }

      .job-header{
        flex-direction:column;
        align-items:flex-start;
      }

      .job-actions{
        width:100%;
      }

      .job-actions button{
        flex:1 1 auto;
      }

      .value{
        font-size:17px;
      }

      .value.small{
        font-size:15px;
      }

      .form-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>副業管理</h1>

    <div class="top-actions">
      <button id="exportBtn" class="primary">データを保存</button>
      <button id="importBtn" class="primary">保存データを読み込む</button>
      <input id="importFile" type="file" accept=".json" style="display:none">
    </div>

    <div class="top-grid">
      <div class="panel">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">案件数</div>
            <div class="stat-value" id="statTotal">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">面談予定</div>
            <div class="stat-value" id="statInterview">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">契約中</div>
            <div class="stat-value" id="statActive">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">納品済</div>
            <div class="stat-value" id="statDone">0</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">要チェック</div>
        <div id="checkList" class="check-list"></div>
      </div>
    </div>

    <div class="panel">
      <div class="filters">
        <input id="searchInput" type="text" placeholder="検索（クライアント名・契約名・状況メモなど）">

        <select id="statusFilter">
          <option value="">すべての状況</option>
          <option value="面談予定">面談予定</option>
          <option value="契約中">契約中</option>
          <option value="納品済">納品済</option>
          <option value="相談中">相談中</option>
          <option value="契約リクエスト中">契約リクエスト中</option>
          <option value="終了">終了</option>
        </select>

        <select id="priorityFilter">
          <option value="">すべての優先</option>
          <option value="最重要">最重要</option>
          <option value="重要">重要</option>
          <option value="確認中">確認中</option>
          <option value="普通">普通</option>
          <option value="待機">待機</option>
        </select>

        <select id="sortOrder">
          <option value="">並び替えなし</option>
          <option value="new">最終連絡日（新しい順）</option>
          <option value="old">最終連絡日（古い順）</option>
        </select>

        <label class="toggle-box">
          <input type="checkbox" id="showEnded">
          <span>終了を表示</span>
        </label>
      </div>
    </div>

    <div id="cards" class="cards"></div>

    <div class="panel">
      <details class="form-wrap">
        <summary>案件を追加 / 編集</summary>

        <div class="form-grid">
          <input type="hidden" id="editId">

          <div>
            <div class="label">優先</div>
            <select id="fPriority">
              <option>普通</option>
              <option>最重要</option>
              <option>重要</option>
              <option>確認中</option>
              <option>待機</option>
            </select>
          </div>

          <div>
            <div class="label">クライアント名</div>
            <input id="fClient" type="text">
          </div>

          <div class="full">
            <div class="label">契約名</div>
            <input id="fContract" type="text">
          </div>

          <div class="full">
            <div class="label">業務内容・契約金</div>
            <textarea id="fWork" rows="4"></textarea>
          </div>

          <div>
            <div class="label">状況</div>
            <select id="fStatus">
              <option>面談予定</option>
              <option>契約中</option>
              <option>納品済</option>
              <option>相談中</option>
              <option>契約リクエスト中</option>
              <option>終了</option>
            </select>
          </div>

          <div>
            <div class="label">状況メモ</div>
            <input id="fStatusMemo" type="text">
          </div>

          <div>
            <div class="label">最終連絡日</div>
            <input id="fLastDate" type="date">
          </div>

          <div class="full">
            <div class="label">メモ</div>
            <textarea id="fMemo" rows="3"></textarea>
          </div>
        </div>

        <div class="save-row">
          <button id="saveBtn">保存する</button>
          <button id="resetBtn" type="button">入力をリセット</button>
        </div>

        <div class="muted" style="margin-top:10px;">
          「面談予定」「契約中」は要チェックに自動表示されます。最終連絡日から7日以上たつと赤く表示されます。
        </div>
      </details>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "sidejob_manager_v7";
    const UI_STORAGE_KEY = "sidejob_manager_ui_v3";

    const initialJobs = [
      {
        id: crypto.randomUUID(),
        priority: "重要",
        client: "M_Takeuchi",
        contract: "【在宅副業】AIを使ったライティングのサポートスタッフ募集！未経験OK",
        work: "1記事あたり、約2,000文字前後\n・AI文章のリライト、調整\n・指定テーマに沿った記事作成\n・簡単なリサーチやキーワード確認\n・文章の流れや構成の整理\n案件によってはSNS投稿文やブログ記事、商品説明文など、さまざまな文章に関わる。",
        status: "契約中",
        statusMemo: "記事作成進行中",
        lastDate: "2026-03-25",
        memo: "優先度高め。進行中案件。"
      },
      {
        id: crypto.randomUUID(),
        priority: "普通",
        client: "mp0119",
        contract: "《大人気！1件500円》✨美容クリニック・外科・皮膚科✨に関する経験談を教えてください【写真付きで+750円】",
        work: "美容クリニックのクチコミ\n文章のみの体験談：500円\n画像付きの体験談：1,250円",
        status: "納品済",
        statusMemo: "クライアント検収中",
        lastDate: "2026-03-24",
        memo: ""
      },
      {
        id: crypto.randomUUID(),
        priority: "待機",
        client: "pino_mio",
        contract: "【初心者歓迎！】youtube等の動画台本作成者さま大募集！【主婦・未経験者活躍中！長期継続・在宅OK】",
        work: "YouTube等のエンタメ動画の台本の作成\n1週間に1～2本程度",
        status: "契約リクエスト中",
        statusMemo: "クライアントの同意待ち",
        lastDate: "2026-03-23",
        memo: ""
      },
      {
        id: crypto.randomUUID(),
        priority: "確認中",
        client: "Voiceステージ",
        contract: "【在宅／未経験OK】ライブ配信・音声コンテンツ制作のお仕事",
        work: "・簡単なトーク／ナレーション収録\n・配信コンテンツ用の音声素材制作\n・台本に沿ったセリフ収録",
        status: "相談中",
        statusMemo: "業務内容がライバーになること？それだと契約内容が違うのでクライアントに確認中",
        lastDate: "2026-03-25",
        memo: ""
      },
      {
        id: crypto.randomUUID(),
        priority: "普通",
        client: "KAGroup",
        contract: "【在宅・スマホOK】音読するだけの簡単作業｜1000文章 7,500円＋消費税｜継続あり",
        work: "・1000文章：7,500円＋消費税\n・1文章あたり：約7.5円＋消費税\n・継続の場合、最大9000文章（約67,500円＋消費税）まで依頼可能\n・1000文章：約4〜7時間程度（個人差あり）",
        status: "納品済",
        statusMemo: "クライアント検収中",
        lastDate: "2026-03-25",
        memo: ""
      },
      {
        id: crypto.randomUUID(),
        priority: "最重要",
        client: "AI推進事業部",
        contract: "【急募】ChatGPTで作ったAIインフルエンサーに喋ってもらう商品紹介動画の台本制作業務【未経験の方でも応募OK】",
        work: "AIで作った商品紹介系インフルエンサーに読んでもらう台本の制作業務\n約60秒間の縦型動画での使用を想定した台本\nTikTokへの投稿を予定\n¥500(税込) / 台本1本",
        status: "面談予定",
        statusMemo: "2026/3/28(土)12時",
        lastDate: "2026-03-24",
        memo: "面談を忘れない。事前に質問をメモしておく。"
      }
    ];

    function loadJobs(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return initialJobs;
      try{
        return JSON.parse(raw);
      }catch{
        return initialJobs;
      }
    }

    function loadUiState(){
      const raw = localStorage.getItem(UI_STORAGE_KEY);
      if(!raw) return { showEnded: false };
      try{
        return JSON.parse(raw);
      }catch{
        return { showEnded: false };
      }
    }

    let jobs = loadJobs().map(j => ({
      ...j,
      status: j.status === "進行中" ? "契約中" : j.status
    }));

    let uiState = loadUiState();

    function saveJobs(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
    }

    function saveUiState(){
      localStorage.setItem(UI_STORAGE_KEY, JSON.stringify(uiState));
    }

    function escapeHtml(str){
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function nl2br(str){
      return escapeHtml(str).replace(/\n/g, "<br>");
    }

    function formatDate(dateStr){
      return dateStr || "";
    }

    function daysSince(dateStr){
      if(!dateStr) return null;
      const d = new Date(dateStr + "T00:00:00");
      if(Number.isNaN(d.getTime())) return null;
      const today = new Date();
      const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const diffMs = todayOnly - d;
      return Math.floor(diffMs / (1000 * 60 * 60 * 24));
    }

    function isStale(job){
      if(job.status === "終了") return false;
      const days = daysSince(job.lastDate);
      return days !== null && days >= 7;
    }

    function getVisibleJobsBase(){
      return jobs.filter(j => uiState.showEnded || j.status !== "終了");
    }

    function renderStats(){
      const visibleJobs = getVisibleJobsBase();
      document.getElementById("statTotal").textContent = visibleJobs.length;
      document.getElementById("statInterview").textContent = visibleJobs.filter(j => j.status === "面談予定").length;
      document.getElementById("statActive").textContent = visibleJobs.filter(j => j.status === "契約中").length;
      document.getElementById("statDone").textContent = visibleJobs.filter(j => j.status === "納品済").length;
    }

    function renderCheckList(filteredJobs){
      const target = filteredJobs.filter(j => ["面談予定","契約中"].includes(j.status));
      const el = document.getElementById("checkList");

      if(target.length === 0){
        el.innerHTML = '<div class="muted">要チェックの案件はありません。</div>';
        return;
      }

      el.innerHTML = target.map(j => `
        <div class="check-item">
          <div class="check-client">${escapeHtml(j.client)}</div>
          <div class="check-status">
            ${escapeHtml(j.status)}${j.statusMemo ? `（${escapeHtml(j.statusMemo)}）` : ""}
            ${isStale(j) ? '<span class="alert-badge">1週間以上連絡なし</span>' : ""}
          </div>
          ${j.memo ? `<div class="check-memo">${escapeHtml(j.memo)}</div>` : ""}
        </div>
      `).join("");
    }

    function getFilteredJobs(){
      const q = document.getElementById("searchInput").value.trim().toLowerCase();
      const status = document.getElementById("statusFilter").value;
      const priority = document.getElementById("priorityFilter").value;
      const sort = document.getElementById("sortOrder").value;

      let result = jobs.filter(j => {
        const text = [
          j.client, j.contract, j.work, j.status, j.statusMemo, j.memo, j.lastDate, j.priority
        ].join(" ").toLowerCase();

        const matchSearch = !q || text.includes(q);
        const matchStatus = !status || j.status === status;
        const matchPriority = !priority || j.priority === priority;
        const matchEnded = uiState.showEnded || j.status !== "終了";

        return matchSearch && matchStatus && matchPriority && matchEnded;
      });

      if(sort === "new"){
        result.sort((a, b) => (b.lastDate || "").localeCompare(a.lastDate || ""));
      } else if(sort === "old"){
        result.sort((a, b) => (a.lastDate || "").localeCompare(b.lastDate || ""));
      }

      return result;
    }

    function renderCards(){
      const filtered = getFilteredJobs();
      const cards = document.getElementById("cards");

      cards.innerHTML = filtered.map(j => `
        <div class="job-card ${isStale(j) ? "stale" : ""} ${j.status === "終了" ? "ended" : ""}">
          <div class="job-header">
            <span class="priority-badge priority-${escapeHtml(j.priority)}">${escapeHtml(j.priority)}</span>
            <div class="job-actions">
              <button class="tiny" onclick="editJob('${j.id}')">編集</button>
              <button class="tiny danger" onclick="deleteJob('${j.id}')">削除</button>
            </div>
          </div>

          <div class="job-grid">
            <div class="field">
              <div class="label">クライアント</div>
              <div class="value">${escapeHtml(j.client)}</div>
            </div>

            <div class="field">
              <div class="label">状況</div>
              <div class="value small">
                <span class="status-pill status-${escapeHtml(j.status)}">${escapeHtml(j.status)}</span>
                ${isStale(j) ? '<span class="alert-badge">1週間以上連絡なし</span>' : ""}
              </div>
            </div>

            <div class="field">
              <div class="label">契約名</div>
              <div class="value contract-name">${escapeHtml(j.contract)}</div>
            </div>

            <div class="field">
              <div class="label">状況メモ</div>
              <div class="value small">${escapeHtml(j.statusMemo || "")}</div>
            </div>

            <div class="field">
              <div class="label">業務内容・契約金</div>
              <div class="value small">${nl2br(j.work || "")}</div>
            </div>

            <div class="field">
              <div class="label">最終連絡日</div>
              <div class="value small">${escapeHtml(formatDate(j.lastDate || ""))}</div>
            </div>

            <div class="field full">
              <div class="label">メモ</div>
              <div class="value small">${nl2br(j.memo || "")}</div>
            </div>
          </div>
        </div>
      `).join("");

      renderStats();
      renderCheckList(filtered);
    }

    function editJob(id){
      const j = jobs.find(x => x.id === id);
      if(!j) return;

      document.getElementById("editId").value = j.id;
      document.getElementById("fPriority").value = j.priority;
      document.getElementById("fClient").value = j.client;
      document.getElementById("fContract").value = j.contract;
      document.getElementById("fWork").value = j.work;
      document.getElementById("fStatus").value = j.status;
      document.getElementById("fStatusMemo").value = j.statusMemo || "";
      document.getElementById("fLastDate").value = j.lastDate || "";
      document.getElementById("fMemo").value = j.memo || "";

      document.querySelector("details.form-wrap").open = true;
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function deleteJob(id){
      if(!confirm("この案件を削除しますか？")) return;
      jobs = jobs.filter(j => j.id !== id);
      saveJobs();
      renderCards();
    }

    window.editJob = editJob;
    window.deleteJob = deleteJob;

    document.getElementById("saveBtn").addEventListener("click", () => {
      const id = document.getElementById("editId").value;
      const data = {
        id: id || crypto.randomUUID(),
        priority: document.getElementById("fPriority").value,
        client: document.getElementById("fClient").value.trim(),
        contract: document.getElementById("fContract").value.trim(),
        work: document.getElementById("fWork").value.trim(),
        status: document.getElementById("fStatus").value,
        statusMemo: document.getElementById("fStatusMemo").value.trim(),
        lastDate: document.getElementById("fLastDate").value,
        memo: document.getElementById("fMemo").value.trim()
      };

      if(!data.client || !data.contract){
        alert("クライアント名と契約名は入力してね。");
        return;
      }

      const index = jobs.findIndex(j => j.id === data.id);
      if(index >= 0){
        jobs[index] = data;
      }else{
        jobs.unshift(data);
      }

      saveJobs();
      renderCards();
      resetForm();
    });

    function resetForm(){
      document.getElementById("editId").value = "";
      document.getElementById("fPriority").value = "普通";
      document.getElementById("fClient").value = "";
      document.getElementById("fContract").value = "";
      document.getElementById("fWork").value = "";
      document.getElementById("fStatus").value = "面談予定";
      document.getElementById("fStatusMemo").value = "";
      document.getElementById("fLastDate").value = "";
      document.getElementById("fMemo").value = "";
    }

    document.getElementById("resetBtn").addEventListener("click", resetForm);
    document.getElementById("searchInput").addEventListener("input", renderCards);
    document.getElementById("statusFilter").addEventListener("change", renderCards);
    document.getElementById("priorityFilter").addEventListener("change", renderCards);
    document.getElementById("sortOrder").addEventListener("change", renderCards);

    document.getElementById("showEnded").checked = !!uiState.showEnded;
    document.getElementById("showEnded").addEventListener("change", (e) => {
      uiState.showEnded = e.target.checked;
      saveUiState();
      renderCards();
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(jobs, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sidejob_data.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById("importBtn").addEventListener("click", () => {
      document.getElementById("importFile").click();
    });

    document.getElementById("importFile").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      try{
        const text = await file.text();
        const imported = JSON.parse(text);
        if(!Array.isArray(imported)) throw new Error("invalid");

        jobs = imported.map(j => ({
          ...j,
          status: j.status === "進行中" ? "契約中" : j.status
        }));

        saveJobs();
        renderCards();
        alert("保存データを読み込みました。");
      }catch{
        alert("読み込みに失敗しました。JSONファイルを確認してください。");
      }

      e.target.value = "";
    });

    saveJobs();
    renderCards();
  </script>
</body>
</html>
